<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📍</text></svg>">
        <title>WWDead Route Planner</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="card">
            <h2>WWDead Route Planner</h2>

            <div class="input-group">
                <label>Source</label>
                <div class="input-wrapper">
                    <input type="text" id="sourceInput" placeholder="Enter starting location..." autocomplete="off" autofocus>
                    <span class="clear-input" onclick="clearField('sourceInput', 'source')">&times;</span>
                </div>
                <div id="sourceDropdown" class="dropdown"></div>
            </div>

            <div class="input-group">
                <label>Destination</label>
                <div class="input-wrapper">
                    <input type="text" id="destInput" placeholder="Enter ending location..." autocomplete="off">
                    <span class="clear-input" onclick="clearField('destInput', 'dest')">&times;</span>
                </div>
                <div id="destDropdown" class="dropdown"></div>
            </div>

            <div id="routeDisplay" style="display: none; margin-top: 20px; font-family: sans-serif; padding: 10px; border-left: 4px solid #007bff; background: #f0f7ff;">
            </div>

        </div>

        <script src="script.js"></script>

    </body>
</html>
