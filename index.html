<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Selector</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --border: #e2e8f0;
        }

        body { font-family: sans-serif; background: var(--bg); padding: 2rem; display: flex; justify-content: center; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        
        .input-group { position: relative; margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #1e293b; }
        
        input { 
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; 
            box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); ring: 2px solid #bfdbfe; }

        .dropdown {
            position: absolute; width: 100%; background: white; border: 1px solid var(--border);
            border-top: none; border-radius: 0 0 6px 6px; max-height: 200px; overflow-y: auto;
            z-index: 10; display: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .dropdown div { padding: 10px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        .dropdown div:hover { background-color: #f1f5f9; }
        .dropdown div span { display: block; font-size: 0.8rem; color: #64748b; }

        .btn { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; 
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Route Planner</h2>
    
    <div class="input-group">
        <label>Source</label>
        <input type="text" id="sourceInput" placeholder="Type city or lat, long..." autocomplete="off">
        <div id="sourceDropdown" class="dropdown"></div>
    </div>

    <div class="input-group">
        <label>Destination</label>
        <input type="text" id="destInput" placeholder="Type city or lat, long..." autocomplete="off">
        <div id="destDropdown" class="dropdown"></div>
    </div>

    <button class="btn" onclick="calculateRoute()">Plan Trip</button>
</div>

<script>
    // Mock Data - Replace with API calls if needed
    const locations = [
        { name: "New York, NY", lat: 40.7128, lng: -74.0060 },
        { name: "Los Angeles, CA", lat: 34.0522, lng: -118.2437 },
        { name: "Chicago, IL", lat: 41.8781, lng: -87.6298 },
        { name: "London, UK", lat: 51.5074, lng: -0.1278 },
        { name: "Tokyo, JP", lat: 35.6762, lng: 139.6503 }
    ];

    function setupAutocomplete(inputId, dropdownId) {
        const input = document.getElementById(inputId);
        const dropdown = document.getElementById(dropdownId);

        input.addEventListener('input', () => {
            const val = input.value.toLowerCase();
            dropdown.innerHTML = '';
            
            if (!val) { dropdown.style.display = 'none'; return; }

            // Check if input is likely a coordinate (e.g., "40, -70")
            const isCoord = /^-?\d+\.?\d*,\s*-?\d+\.?\d*$/.test(val);

            const filtered = locations.filter(loc => 
                loc.name.toLowerCase().includes(val)
            );

            if (filtered.length > 0) {
                dropdown.style.display = 'block';
                filtered.forEach(loc => {
                    const item = document.createElement('div');
                    item.innerHTML = `${loc.name} <span>${loc.lat}, ${loc.lng}</span>`;
                    item.onclick = () => {
                        input.value = `${loc.name} (${loc.lat}, ${loc.lng})`;
                        dropdown.style.display = 'none';
                    };
                    dropdown.appendChild(item);
                });
            } else if (isCoord) {
                // If user types raw valid coords, give them an option to use it
                dropdown.style.display = 'block';
                const item = document.createElement('div');
                item.innerHTML = `Use coordinates: <span>${val}</span>`;
                item.onclick = () => {
                    input.value = val;
                    dropdown.style.display = 'none';
                };
                dropdown.appendChild(item);
            } else {
                dropdown.style.display = 'none';
            }
        });

        // Hide dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (e.target !== input) dropdown.style.display = 'none';
        });
    }

    setupAutocomplete('sourceInput', 'sourceDropdown');
    setupAutocomplete('destInput', 'destDropdown');

    function calculateRoute() {
        const start = document.getElementById('sourceInput').value;
        const end = document.getElementById('destInput').value;
        if(start && end) {
            alert(`Routing from: ${start}\nTo: ${end}`);
        } else {
            alert("Please select both locations.");
        }
    }
</script>

</body>
</html>
